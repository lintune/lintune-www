baseURL = 'https://lintune.xyz/'
locale = 'en-us'
title = 'lintune'
contentDir = 'content'
enableEmoji = true
enableRobotsTXT = true

[module]
    [[module.imports]]
        path = "github.com/colinwilson/lotusdocs"
        disable = false
    [[module.imports]]
        path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
        disable = false

[markup]
    [markup.tableOfContents]
        endLevel = 3
        startLevel = 1
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
        [markup.goldmark.parser]
            [markup.goldmark.parser.attribute]
                block = true

[params]
    google_fonts = [["Inter", "300, 400, 600, 700"], ["Fira Code", "500, 700"]]
    sans_serif_font = "Inter"
    secondary_font = "Inter"
    mono_font = "Fira Code"

    logo = "images/lintune-mark-light.svg"
    logoDark = "images/lintune-mark-dark.svg"
    logoHeight = 36
    logoWidth = 36
    logoText = "lintune"

    [params.footer]
        copyright = "© 2026 lintune"
        version = false

    [params.social]
        github = "lintune"

    [params.docs]
        title = "Lintune Docs"
        pathName = "docs"
        themeColor = "green"
        darkMode = true
        prism = true
        breadcrumbs = true
        editPage = false
        lastMod = false
        toc = true
        tocMobile = true
        sidebarIcons = true

    [params.flexsearch]
        enabled = true

[menu]
    [[menu.primary]]
        name = "Docs"
        url = "/docs"
        identifier = "docs"
        weight = 10

