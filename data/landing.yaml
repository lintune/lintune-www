hero:
  enable: true
  weight: 10
  template: hero

  badge:
    text: "Heavy alpha — not for production use"
    icon: "warning"
    color: "warning"
    pill: false
    soft: true

  title: "Self-hosted identity, mail, and storage."
  subtitle: "One platform. Install Keycloak, Mailcow, and Nextcloud in minutes — wired to single sign-on automatically."

  ctaButton:
    icon: rocket_launch
    btnText: "Install in 5 minutes"
    url: "/docs/install"

  cta2Button:
    icon: menu_book
    btnText: "Read the docs"
    url: "/docs"

  info: "[**keycloak**](https://keycloak.org) · [**mailcow**](https://mailcow.email) · [**nextcloud**](https://github.com/nextcloud/all-in-one) · [**uptime-kuma**](https://uptimekuma.org/) · open source · [MIT](https://raw.githubusercontent.com/lintune/lintune-admin/refs/heads/dev/LICENSE)"

featureGrid:
  enable: true
  weight: 20
  template: feature_grid

  title: "Everything your users need. Self-hosted."
  subtitle: "One install. One login. Four services, fully integrated."

  items:
    - title: "Single Sign-On"
      icon: key
      description: "Powered by Keycloak. One set of credentials for email, files, and every service in the platform."

    - title: "Email"
      icon: email
      description: "Full-featured mail stack via Mailcow. SMTP, IMAP, webmail — OIDC-connected at install time."

    - title: "File Storage"
      icon: folder
      description: "Nextcloud All-in-One, pre-configured automatically. OIDC login wired during the install wizard."

    - title: "Monitoring"
      icon: monitor_heart
      description: "Uptime Kuma with a custom REST API. All services watched and alerting from day one."

imageCompare:
  enable: true

imageText:
  enable: true
