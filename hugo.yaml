baseURL: 'https://lintune.xyz/'
locale: en-us
title: lintune
enableEmoji: true
enableRobotsTXT: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  description: "Self-hosted identity, mail, and storage. One platform."
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/lintune-lockup-light.svg
      dark: images/lintune-lockup-dark.svg
      link: /
      width: 300
      height: 80
  footer:
    displayCopyright: true
    displayPoweredBy: false
  theme:
    default: system
    displayToggle: true
  banner:
    content: "heavy alpha — not for production use"
  externalLinkDecoration: false

menu:
  main:
    - name: Docs
      url: /docs
      weight: 10
    - name: GitHub
      url: https://github.com/lintune
      weight: 20
      params:
        icon: github
    - name: Toggle theme
      weight: 30
      params:
        type: theme-toggle
